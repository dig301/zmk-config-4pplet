# This file generates the GitHub Actions matrix
---
include:
  # Dongle: XIAO BLE with c60d + prospector_adapter shields
  - board: xiao_ble//zmk
    shield: c60d prospector_adapter
  # Keyboard: Cyber60 Rev D as split peripheral (communicates via dongle)
  - board: cyber60/nrf52840
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
