# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  # Dongle: Seeed XIAO BLE with cyber60_dongle + prospector_adapter shields
  - board: seeeduino_xiao_ble
    shield: cyber60_dongle prospector_adapter
  # Keyboard: Cyber60 as a split keyboard peripheral
  - board: cyber60_rev_d
    shield: cyber60_peripheral
